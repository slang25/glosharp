name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet-build-and-test:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore test fixtures
        run: dotnet restore tests/GloSharp.Tests/fixtures/sample-project/SampleProject.csproj

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet run --project tests/GloSharp.Tests/

  node-build-and-test:
    name: Node Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: rm package-lock.json && npm install

      - name: Build packages
        run: |
          npm run build -w @glosharp/core
          npm run build -w @glosharp/shiki
          npm run build -w @glosharp/expressive-code

      - name: E2E tests
        run: npm test --workspace=tests/e2e
