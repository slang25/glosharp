name: Publish npm packages

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build -w @slang25/twohash
          npm run build -w @slang25/shiki
          npm run build -w @slang25/expressive-code

      - name: Publish packages
        run: |
          npm publish -w @slang25/twohash --access public --tag alpha
          npm publish -w @slang25/shiki --access public --tag alpha
          npm publish -w @slang25/expressive-code --access public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
