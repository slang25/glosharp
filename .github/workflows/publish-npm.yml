name: Publish npm packages

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Bump prerelease versions
        run: |
          # Get the next alpha version based on what's already published
          get_next_version() {
            local pkg=$1
            local current=$(npm view "$pkg" dist-tags.alpha 2>/dev/null || echo "")
            if [ -z "$current" ]; then
              echo "0.1.0-alpha.1"
            else
              # Increment the prerelease number
              local base=$(echo "$current" | sed 's/\.[0-9]*$//')
              local num=$(echo "$current" | grep -o '[0-9]*$')
              echo "${base}.$((num + 1))"
            fi
          }

          NEXT=$(get_next_version "@twohash/core")
          echo "Publishing version: $NEXT"

          # Set the same version on all packages
          npm pkg set "version=$NEXT" -w @twohash/core
          npm pkg set "version=$NEXT" -w @twohash/shiki
          npm pkg set "version=$NEXT" -w @twohash/expressive-code

          # Update cross-package dependency references
          cd packages/shiki && npm pkg set "dependencies.@twohash/core=$NEXT" && cd ../..
          cd packages/expressive-code && npm pkg set "dependencies.@twohash/core=$NEXT" && cd ../..

      - name: Build packages
        run: |
          npm run build -w @twohash/core
          npm run build -w @twohash/shiki
          npm run build -w @twohash/expressive-code

      - name: Publish packages
        run: |
          npm publish -w @twohash/core --access public --tag alpha
          npm publish -w @twohash/shiki --access public --tag alpha
          npm publish -w @twohash/expressive-code --access public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
