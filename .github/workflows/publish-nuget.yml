name: Publish NuGet packages

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Get next alpha version
        id: version
        run: |
          # Query NuGet for the latest published alpha version of GloSharp.Core
          CURRENT=$(dotnet package search GloSharp.Core --source https://api.nuget.org/v3/index.json --prerelease --exact-match --format json \
            | jq -r '[.searchResult[0].packages[] | select(.version | test("alpha"))] | sort_by(.version) | last | .version // empty' 2>/dev/null || echo "")
          if [ -z "$CURRENT" ]; then
            NEXT="0.1.0-alpha.1"
          else
            BASE=$(echo "$CURRENT" | sed 's/\.[0-9]*$//')
            NUM=$(echo "$CURRENT" | grep -o '[0-9]*$')
            NEXT="${BASE}.$((NUM + 1))"
          fi
          echo "Publishing version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages
        run: |
          dotnet nuget push src/GloSharp.Core/bin/Release/GloSharp.Core.*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          dotnet nuget push src/GloSharp.Cli/bin/Release/GloSharp.Cli.*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
