name: Deploy Website to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Pack and install GloSharp CLI tool
        run: |
          dotnet pack src/GloSharp.Cli/GloSharp.Cli.csproj -o .nupkg/
          dotnet tool install GloSharp.Cli --local --add-source .nupkg/

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build -w website

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
